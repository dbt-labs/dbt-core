version: 2
updates:
  # python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
    rebase-strategy: "disabled"
  - package-ecosystem: "pip"
    directory: "/core"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
    rebase-strategy: "disabled"

  # docker dependencies
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    rebase-strategy: "disabled"
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    rebase-strategy: "disabled"

  # github dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    rebase-strategy: "disabled"
